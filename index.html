<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>具身操作 Agent</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #111827;
      --card: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.14);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #60a5fa;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      --radius: 24px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(96, 165, 250, 0.20), transparent 35%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      display: grid;
      place-items: center;
      padding: 32px 16px;
    }

    .wrap {
      width: min(980px, 100%);
      text-align: center;
    }

    h1 {
      margin: 0 0 28px;
      font-size: clamp(34px, 5vw, 56px);
      letter-spacing: -0.03em;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      backdrop-filter: blur(18px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    video {
      width: 100%;
      display: block;
      border-radius: 18px;
      background: #000;
      max-height: 72vh;
    }

    .links {
      margin-top: 22px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    a.btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 999px;
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.06);
      transition: transform .18s ease, background .18s ease;
    }

    a.btn:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.12);
    }

    .hint {
      margin-top: 16px;
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>具身操作 Agent</h1>

    <section class="card">
      <video controls preload="metadata">
        <source src="演示.mp4" type="video/mp4" />
        你的浏览器不支持 HTML5 video。
      </video>
    </section>

    <div class="links">
      <a class="btn" href="https://github.com/Vitreastar/embodied_agent-grasp" target="_blank" rel="noreferrer">GitHub 仓库</a>
    </div>


  </main>
</body>
</html>
